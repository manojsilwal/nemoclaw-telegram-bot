# OpenClaw on Render — https://docs.openclaw.ai/install/render
# Set secrets in the dashboard: OPENCLAW_GATEWAY_TOKEN, GEMINI_API_KEY (or GOOGLE_API_KEY), TELEGRAM_BOT_TOKEN.
services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"
      - key: OPENCLAW_STATE_DIR
        value: /home/node/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /home/node/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FIRECRAWL_BASE_URL
        value: "https://fincrawler.onrender.com"
      - key: FIRECRAWL_API_KEY
        sync: false
