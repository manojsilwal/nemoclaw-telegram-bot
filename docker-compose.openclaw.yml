# OpenClaw + Telegram + Gemini on GCP (single service).
# Bind loopback only — use SSH tunnel or Tailscale to reach :8080.
#
# Deploy from your Mac (repo root):
#   source ~/.zshrc   # GOOGLE_API_KEY, TELEGRAM_BOT_TOKEN
#   bash scripts/gcp-deploy-from-local.sh
#
# Requires Docker on the VM (script installs docker.io if missing on Ubuntu).

services:
  openclaw:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file: .env
    environment:
      OPENCLAW_GATEWAY_PORT: "8080"
      NODE_OPTIONS: "--max-old-space-size=384"
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/workspace
    volumes:
      - openclaw-state:/home/node/.openclaw
      - openclaw-workspace:/home/node/workspace

volumes:
  openclaw-state:
  openclaw-workspace:
